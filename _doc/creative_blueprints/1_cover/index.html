<style>
  .mode-landscape .sl-layout { flex-direction: row; }
  .mode-portrait .sl-layout { flex-direction: column; }
  .mode-landscape .sl-visual { width: 45%; height: 100%; }
  .mode-portrait .sl-visual { width: 100%; height: 45%; }
  .mode-landscape .sl-content { width: 55%; }
  .mode-portrait .sl-content { width: 100%; }
</style>

<section class="w-full h-full overflow-auto bg-white">
  <div class="sl-layout flex h-full">

    <!-- Left: Content -->
    <div class="sl-content flex flex-col justify-between p-12" style="background: white;">
      <!-- Top badge -->
      <div>
        <span class="inline-block px-3 py-1 rounded-full text-xs font-semibold tracking-widest uppercase mb-8" style="background-color: {{config.brandColor.accent}}; color: {{config.brandColor.accentForeground}};">AI-Powered Nutrition</span>

        <!-- Headline -->
        <h1 class="font-black leading-tight mb-4" style="font-family: {{config.font.headingFont}}, sans-serif; font-size: 3.2rem; color: {{config.brandColor.foreground}};">
          Eat smarter,<br/>
          <span style="color: {{config.brandColor.primary}};">not harder.</span>
        </h1>

        <!-- Tagline -->
        <p class="text-lg leading-relaxed max-w-sm" style="font-family: {{config.font.textFont}}, sans-serif; color: {{config.brandColor.mutedForeground}};">
          {{config.description}}
        </p>
      </div>

      <!-- Pills row -->
      <div class="flex flex-wrap gap-2 my-6">
        <span class="px-3 py-1 rounded-full text-sm font-medium" style="background: {{config.brandColor.muted}}; color: {{config.brandColor.foreground}};">🥗 Personalized Plans</span>
        <span class="px-3 py-1 rounded-full text-sm font-medium" style="background: {{config.brandColor.muted}}; color: {{config.brandColor.foreground}};">🛒 Smart Shopping</span>
        <span class="px-3 py-1 rounded-full text-sm font-medium" style="background: {{config.brandColor.muted}}; color: {{config.brandColor.foreground}};">📊 Nutrition Tracking</span>
      </div>

      <!-- Attribution -->
      <div>
        <data-attribution />
      </div>
    </div>

    <!-- Right: Visual -->
    <div class="sl-visual relative overflow-hidden flex items-center justify-center" style="background: linear-gradient(135deg, {{config.brandColor.primary}} 0%, #15803d 100%);">
      <img
        src="https://api-stag.qb-deck.quantumbyte.ai/common/image-generation?prompt=vibrant%20flat%20illustration%20of%20a%20colorful%20healthy%20meal%20bowl%20with%20vegetables%20grains%20and%20fruits%20on%20a%20clean%20white%20plate%20overhead%20view%20fresh%20green%20and%20orange%20tones"
        alt="Happy Meal illustration"
        class="w-full h-full object-cover opacity-90"
        style="mix-blend-mode: luminosity;"
      />
      <!-- Overlay card -->
      <div class="absolute bottom-8 left-8 right-8 rounded-2xl p-5" style="background: rgba(255,255,255,0.15); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.3);">
        <p class="text-sm font-semibold mb-1" style="color: rgba(255,255,255,0.8); font-family: {{config.font.textFont}}, sans-serif;">Your weekly plan, in seconds</p>
        <p class="text-2xl font-black" style="color: white; font-family: {{config.font.headingFont}}, sans-serif;">{{config.appName}}</p>
      </div>
    </div>

  </div>
</section>
